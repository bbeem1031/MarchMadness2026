<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Team Comparison — March Madness Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;700&display=swap');
  :root {
    --navy:#0f1923;--red:#e8502a;--orange:#dc6f1a;--gold:#f0a500;
    --green:#2a7a4b;--slate:#94a3b8;--light:#f0f4f8;
    --card:#1a2535;--border:rgba(255,255,255,0.08);--text:#f1f5f9;
    --blue:#60a5fa;--purple:#a78bfa;--teal:#2dd4bf;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}

  /* ── HEADER ── */
  .header{padding:32px 40px 28px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,#0a1520 0%,#0f1923 100%);}
  .back{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--slate);text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;}
  .back:hover{color:var(--text);}
  .eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--red);margin-bottom:10px;text-transform:uppercase;}
  .header h1{font-family:'DM Serif Display',serif;font-size:38px;line-height:1.05;letter-spacing:-0.5px;}
  .header h1 em{color:var(--red);font-style:normal;}
  .header-sub{font-size:13px;color:var(--slate);margin-top:8px;}

  /* ── SELECTOR ── */
  .selector{padding:28px 40px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.01);}
  .selector-inner{display:grid;grid-template-columns:1fr 60px 1fr;gap:16px;align-items:center;max-width:900px;}
  .sel-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--slate);margin-bottom:8px;}
  .sel-team{font-size:13px;font-weight:600;color:var(--text);margin-top:4px;}
  select{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;border-radius:6px;outline:none;cursor:pointer;appearance:none;}
  select:hover{border-color:rgba(255,255,255,0.2);}
  select:focus{border-color:var(--teal);}
  .vs{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--slate);text-align:center;}
  .swap-btn{display:block;width:100%;margin-top:12px;background:transparent;border:1px solid var(--border);color:var(--slate);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:7px;border-radius:4px;cursor:pointer;}
  .swap-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text);}

  /* ── MAIN ── */
  .main{padding:32px 40px 60px;}
  .sec{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--slate);margin-bottom:14px;text-transform:uppercase;}
  .sec-block{margin-bottom:28px;}

  /* ── HERO COMPARE ── */
  .hero-compare{display:grid;grid-template-columns:1fr auto 1fr;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px;}
  .hc-team{padding:24px 28px;}
  .hc-team.left{background:linear-gradient(135deg,#1a2535,#0f1f35);}
  .hc-team.right{background:linear-gradient(135deg,#1a2535,#0f1f35);text-align:right;}
  .hc-divider{background:rgba(255,255,255,0.04);width:1px;display:flex;align-items:center;justify-content:center;padding:0 20px;}
  .hc-divider-inner{font-family:'Space Mono',monospace;font-size:11px;color:var(--slate);}
  .hc-rk{font-family:'Space Mono',monospace;font-size:10px;color:var(--slate);letter-spacing:1px;margin-bottom:4px;}
  .hc-name{font-family:'DM Serif Display',serif;font-size:28px;line-height:1;}
  .hc-conf{font-family:'Space Mono',monospace;font-size:9px;color:var(--slate);letter-spacing:2px;margin-top:4px;}
  .hc-rec{font-family:'Space Mono',monospace;font-size:12px;color:var(--teal);margin-top:8px;}
  .hc-bar{display:flex;align-items:center;gap:8px;margin-top:12px;}
  .hc-team.right .hc-bar{justify-content:flex-end;}
  .hc-bar-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
  .hc-bar-lbl{font-size:10px;color:var(--slate);}
  .inj-flag{display:inline-block;font-family:'Space Mono',monospace;font-size:8px;font-weight:700;background:var(--red);color:white;padding:2px 7px;border-radius:3px;margin-top:8px;}

  /* ── STAT COMPARE ROWS ── */
  .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .box{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .box h3{padding:14px 20px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);}
  .bh3-red{color:var(--red)}.bh3-blue{color:var(--blue)}.bh3-teal{color:var(--teal)}
  .bh3-purple{color:var(--purple)}.bh3-orange{color:var(--orange)}.bh3-gold{color:var(--gold)}
  .bh3-green{color:#4ade80;}

  /* stat bar rows */
  .srow{padding:10px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 180px 1fr;gap:8px;align-items:center;}
  .srow:last-child{border-bottom:none;}
  .srow-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--slate);letter-spacing:0.5px;text-align:center;}
  .srow-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;}
  .srow-val.left{text-align:left;}
  .srow-val.right{text-align:right;}
  .srow-bar-wrap{display:flex;align-items:center;gap:4px;}
  .srow-bar{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.06);}
  .srow-bar-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}
  .win{color:#4ade80;} .lose{color:var(--red);} .tie{color:var(--slate);}
  .srow-hdr{padding:8px 20px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);}
  .srow-hdr-inner{display:grid;grid-template-columns:1fr 180px 1fr;gap:8px;}
  .srow-hdr-name{font-family:'Space Mono',monospace;font-size:9px;color:var(--teal);letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow-hdr-name.right{text-align:right;}

  /* ── ROSTER TABLE ── */
  .roster-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .rtable{width:100%;border-collapse:collapse;font-size:11px;}
  .rtable th{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--slate);padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
  .rtable th.left{text-align:left;}
  .rtable td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:right;color:var(--slate);}
  .rtable td.left{text-align:left;color:var(--text);}
  .rtable tr:last-child td{border-bottom:none;}
  .rtable tr:hover td{background:rgba(255,255,255,0.02);}
  .p-name{font-weight:600;font-size:12px;}
  .p-star{color:var(--gold);}
  .yr-badge{font-family:'Space Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:2px;margin-left:4px;}
  .yr-Fr{background:rgba(232,80,42,0.25);color:#fca5a5;}
  .yr-So{background:rgba(240,165,0,0.2);color:#fde68a;}
  .yr-Jr{background:rgba(45,212,191,0.15);color:var(--teal);}
  .yr-Sr{background:rgba(96,165,250,0.2);color:var(--blue);}
  .inj-pill{font-family:'Space Mono',monospace;font-size:7px;font-weight:700;background:var(--red);color:white;padding:1px 5px;border-radius:2px;margin-left:4px;white-space:nowrap;}
  .inj-gtd{background:var(--orange);}
  .usg-bar{display:inline-block;height:3px;border-radius:2px;background:var(--teal);vertical-align:middle;margin-left:4px;}
  .prpg-hi{color:#4ade80;}
  .prpg-mid{color:var(--orange);}

  /* ── EXPERIENCE / DEPENDENCY ── */
  .dep-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .dep-box{padding:20px;}
  .dep-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--slate);margin-bottom:12px;}
  .dep-stat{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .dep-stat-lbl{font-size:12px;color:var(--slate);}
  .dep-stat-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;}
  .yr-strip{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .yr-chip{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 9px;border-radius:3px;}

  /* ── RISK FACTORS ── */
  .risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .risk-item{display:flex;gap:10px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--border);}
  .risk-item:last-child{border-bottom:none;}
  .risk-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
  .risk-text{font-size:11px;color:var(--slate);line-height:1.5;}
  .risk-text strong{color:var(--text);display:block;margin-bottom:2px;}
  .risk-none{padding:14px 20px;font-size:11px;color:var(--slate);font-style:italic;}

  /* ── MOMENTUM ── */
  .mom-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}

  /* ── VERDICT ── */
  .verdict-box{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px;}
  .verdict-header{padding:16px 24px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);}
  .verdict-header h3{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--purple);}
  .verdict-body{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .verdict-team{font-size:12px;line-height:1.7;color:var(--slate);}
  .verdict-team h4{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;margin-bottom:10px;}
  .verdict-edge{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;display:inline-block;margin-top:4px;}
  .edge-win{background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.3);}
  .edge-lose{background:rgba(232,80,42,0.15);color:#fca5a5;border:1px solid rgba(232,80,42,0.3);}
  .edge-even{background:rgba(148,163,184,0.1);color:var(--slate);border:1px solid rgba(148,163,184,0.2);}

  /* empty state */
  .empty{padding:60px 40px;text-align:center;color:var(--slate);font-size:14px;}
  .empty-icon{font-size:40px;margin-bottom:16px;}

  @media(max-width:900px){
    .selector-inner{grid-template-columns:1fr;}.vs{display:none;}
    .hero-compare{grid-template-columns:1fr;}.hc-divider{width:100%;height:1px;padding:12px 20px;}
    .compare-grid,.roster-grid,.dep-grid,.risk-grid,.mom-grid,.verdict-body{grid-template-columns:1fr;}
    .header{padding:20px;}.selector{padding:20px;}.main{padding:20px 20px 40px;}
  }
</style>
</head>

const CONF_PASE = {
  'ACC':'+12.4','Big Ten':'+4.5','SEC':'+4.4','WCC':'+7.3','MVC':'+4.1',
  'AAC':'+2.1','Big 12':'-15.9','MWC':'-15.6','Big East':'-7.3','A-10':'-5.8',
  'CAA':'+3.2','Southland':'+1.1','Sun Belt':'+0.8'
};

// Populate dropdowns sorted by rank
window.onload = () => {
  ['selA','selB'].forEach(id => {
    const sel = document.getElementById(id);
    TEAMS.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.team;
      opt.textContent = `#${t.rk} ${t.team} (${t.conf})`;
      sel.appendChild(opt);
    });
  });
  // Default: Duke vs Michigan
  document.getElementById('selA').value = 'Duke';
  document.getElementById('selB').value = 'Michigan';
  render();
};

function swap() {
  const a = document.getElementById('selA');
  const b = document.getElementById('selB');
  [a.value, b.value] = [b.value, a.value];
  render();
}

function getTeam(name) { return TEAMS.find(t => t.team === name); }

function bartColor(v) {
  if (v >= 0.95) return '#4ade80';
  if (v >= 0.90) return '#86efac';
  if (v >= 0.85) return '#94a3b8';
  if (v >= 0.80) return '#fbbf24';
  return '#f87171';
}

function prpgColor(v) { return v >= 4 ? 'prpg-hi' : v >= 2 ? 'prpg-mid' : ''; }

function yrBadge(yr) {
  const map = {Fr:'yr-Fr',So:'yr-So',Jr:'yr-Jr',Sr:'yr-Sr'};
  return `<span class="yr-badge ${map[yr]||''}">${yr||'?'}</span>`;
}

function injPill(p) {
  if (!p.inj) return '';
  const cls = (p.injStatus||'').includes('Game Time') ? 'inj-pill inj-gtd' : 'inj-pill';
  const short = p.injStatus?.includes('Out For Season') ? 'OUT ∞' :
                p.injStatus?.includes('Game Time') ? 'GTD' : 'OUT';
  return `<span class="${cls}">${p.inj} · ${short}</span>`;
}

function usgBar(usg) {
  const w = Math.min(usg / 36 * 40, 40);
  return `<span class="usg-bar" style="width:${w}px"></span>`;
}

// Win/lose color for stat comparison
function statColor(vA, vB, higherIsBetter=true) {
  if (vA === vB) return ['tie','tie'];
  if (higherIsBetter) return vA > vB ? ['win','lose'] : ['lose','win'];
  return vA < vB ? ['win','lose'] : ['lose','win'];
}

// Render a stat comparison bar row
function statRow(label, vA, vB, higherIsBetter=true, suffix='', decimals=1) {
  const [ca, cb] = statColor(vA, vB, higherIsBetter);
  const maxV = Math.max(Math.abs(vA), Math.abs(vB), 0.001);
  const pctA = Math.min(Math.abs(vA)/maxV * 100, 100);
  const pctB = Math.min(Math.abs(vB)/maxV * 100, 100);
  const fmtA = typeof vA === 'number' ? vA.toFixed(decimals)+suffix : vA;
  const fmtB = typeof vB === 'number' ? vB.toFixed(decimals)+suffix : vB;
  const colorA = ca==='win' ? '#4ade80' : ca==='lose' ? '#f87171' : '#94a3b8';
  const colorB = cb==='win' ? '#4ade80' : cb==='lose' ? '#f87171' : '#94a3b8';
  return `<div class="srow">
    <div class="srow-bar-wrap">
      <span class="srow-val left ${ca}">${fmtA}</span>
      <span class="srow-bar"><span class="srow-bar-fill" style="width:${pctA}%;background:${colorA};"></span></span>
    </div>
    <div class="srow-lbl">${label}</div>
    <div class="srow-bar-wrap" style="flex-direction:row-reverse">
      <span class="srow-val right ${cb}">${fmtB}</span>
      <span class="srow-bar"><span class="srow-bar-fill" style="width:${pctB}%;background:${colorB};"></span></span>
    </div>
  </div>`;
}

function sectionHdr(tA, tB) {
  return `<div class="srow-hdr">
    <div class="srow-hdr-inner">
      <div class="srow-hdr-name">${tA.team}</div>
      <div></div>
      <div class="srow-hdr-name right">${tB.team}</div>
    </div>
  </div>`;
}

function riskItems(t) {
  const items = [];
  const star = t.players[0];
  if (t.injStar) {
    items.push({icon:'🚨', title:'Injured Star Player', text:`${star.name} (${star.usg}% USG) — ${star.inj} · ${star.injStatus}`});
  }
  if (t.injCount >= 2) {
    items.push({icon:'🏥', title:`${t.injCount} Players on Injury Report`, text:'Depth concern — multiple contributors potentially limited'});
  } else if (t.injCount === 1 && !t.injStar) {
    items.push({icon:'🩹', title:'1 Player on Injury Report', text:`${t.players.find(p=>p.inj)?.name||''} — monitor before tipoff`});
  }
  if (t.usgConc > 0.55) {
    items.push({icon:'⚡', title:'High Star Dependency', text:`${star.name} carries ${star.usg}% usage — ${Math.round(t.usgConc*100)}% above team avg. Opponent can game-plan around one player.`});
  }
  if (t.barthag < 0.85) {
    items.push({icon:'⚠️', title:'BARTHAG Danger Zone', text:`${t.barthag} — below 0.85 threshold. Seeds 5-8 in this range lose 61.4% of R1 games.`});
  }
  if (t.pace > 72) {
    items.push({icon:'🔺', title:'Outside Trapezoid — Too Fast', text:`Pace ${t.pace} exceeds 72 adj. tempo threshold. Rule 17: Fast-tempo teams are vulnerable over 6-game runs.`});
  }
  if (t.exp < 1.0) {
    items.push({icon:'🎓', title:'Young Roster', text:`Experience ${t.exp} — heavy freshmen/sophomore load increases tournament pressure risk.`});
  }
  const confPASE = CONF_PASE[t.conf];
  if (confPASE && confPASE.startsWith('-')) {
    items.push({icon:'📉', title:`${t.conf} Conference PASE ${confPASE}`, text:'Conference chronically overseeded by reputation — fade signal on seeds 5-8.'});
  }
  // l10 momentum drop
  if (t.l10_bar > 0 && t.barthag - t.l10_bar > 0.05) {
    items.push({icon:'❄️', title:'Cold Entering Tournament', text:`Season BARTHAG ${t.barthag} vs L10 BARTHAG ${t.l10_bar.toFixed(3)} — declining form.`});
  }
  return items;
}

function render() {
  const nameA = document.getElementById('selA').value;
  const nameB = document.getElementById('selB').value;
  const main = document.getElementById('main');

  if (!nameA || !nameB || nameA === nameB) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">🏀</div>${!nameA||!nameB ? 'Select two teams above to compare' : 'Select two <em>different</em> teams'}</div>`;
    return;
  }

  const tA = getTeam(nameA);
  const tB = getTeam(nameB);

  // ── HERO ──
  const heroA = `<div class="hc-team left">
    <div class="hc-rk">#${tA.rk} · ${tA.conf}</div>
    <div class="hc-name">${tA.team}</div>
    <div class="hc-rec">${tA.rec}${tA.l10_rec ? ' · L10: '+tA.l10_rec : ''}</div>
    <div class="hc-bar">
      <div class="hc-bar-val" style="color:${bartColor(tA.barthag)}">${tA.barthag}</div>
      <div class="hc-bar-lbl">BARTHAG</div>
    </div>
    ${tA.injStar ? '<div class="inj-flag">⚠ STAR INJURED</div>' : ''}
  </div>`;

  const heroB = `<div class="hc-team right">
    <div class="hc-rk">#${tB.rk} · ${tB.conf}</div>
    <div class="hc-name">${tB.team}</div>
    <div class="hc-rec">${tB.rec}${tB.l10_rec ? ' · L10: '+tB.l10_rec : ''}</div>
    <div class="hc-bar" style="justify-content:flex-end">
      <div class="hc-bar-lbl">BARTHAG</div>
      <div class="hc-bar-val" style="color:${bartColor(tB.barthag)}">${tB.barthag}</div>
    </div>
    ${tB.injStar ? '<div class="inj-flag" style="margin-left:auto">⚠ STAR INJURED</div>' : ''}
  </div>`;

  // ── EFFICIENCY STATS ──
  const effRows = [
    statRow('Adj. Offensive Eff.', tA.adjOE, tB.adjOE, true),
    statRow('Adj. Defensive Eff.', tA.adjDE, tB.adjDE, false),
    statRow('Net Rating', tA.netRtg, tB.netRtg, true),
    statRow('eFG% (Off.)', tA.efg, tB.efg, true, '%'),
    statRow('eFG% (Def.)', tA.efgD, tB.efgD, false, '%'),
    statRow('Turnover% (Off.)', tA.tov, tB.tov, false, '%'),
    statRow('Turnover% (Def.)', tA.tovD, tB.tovD, true, '%'),
    statRow('Off. Rebound%', tA.oreb, tB.oreb, true, '%'),
    statRow('Opp. OReb% Allowed', tA.dreb, tB.dreb, false, '%'),
  ];

  // ── ROSTER CONTEXT ──
  const contextRows = [
    statRow('Pace (Adj. Tempo)', tA.pace, tB.pace, true),
    statRow('Experience', tA.exp, tB.exp, true, '', 2),
    statRow('Talent Score', tA.talent, tB.talent, true),
    statRow('Avg Height (in.)', tA.hgt, tB.hgt, true),
    statRow('Elite SOS', tA.sos, tB.sos, true),
  ];

  // ── PLAYER DEPENDENCY ──
  const makeDepBox = (t, side) => {
    const star = t.players[0];
    const [ca] = statColor(t.usgConc, 0.4, false); // lower conc is better
    const concColor = t.usgConc > 0.5 ? '#f87171' : t.usgConc > 0.35 ? '#fbbf24' : '#4ade80';
    const yr = t.yrBreakdown;
    const align = side === 'right' ? 'text-align:right' : '';
    return `<div class="dep-box" style="${align}">
      <div class="dep-title">DEPENDENCY PROFILE</div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">Star (${star.name})</span>
        <span class="dep-stat-val" style="color:${star.usg>=30?'#f87171':star.usg>=25?'#fbbf24':'#94a3b8'}">${star.usg}% USG</span>
      </div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">Usage Concentration</span>
        <span class="dep-stat-val" style="color:${concColor}">${Math.round(t.usgConc*100)}% above avg</span>
      </div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">Team PRPG Total</span>
        <span class="dep-stat-val" style="color:var(--teal)">${t.totalPrpg}</span>
      </div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">Injuries</span>
        <span class="dep-stat-val" style="color:${t.injCount>0?'#f87171':'#4ade80'}">${t.injCount > 0 ? t.injCount+' on report' : 'None'}</span>
      </div>
      <div style="margin-top:12px;font-family:'Space Mono',monospace;font-size:9px;color:var(--slate);letter-spacing:1px;margin-bottom:6px;">EXPERIENCE BREAKDOWN</div>
      <div class="yr-strip" style="${side==='right'?'justify-content:flex-end':''}">
        ${yr.Fr>0 ? `<span class="yr-chip yr-Fr">${yr.Fr} Fr</span>` : ''}
        ${yr.So>0 ? `<span class="yr-chip yr-So">${yr.So} So</span>` : ''}
        ${yr.Jr>0 ? `<span class="yr-chip yr-Jr">${yr.Jr} Jr</span>` : ''}
        ${yr.Sr>0 ? `<span class="yr-chip yr-Sr">${yr.Sr} Sr</span>` : ''}
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--slate);padding:3px 0">Exp ${t.exp}</span>
      </div>
    </div>`;
  };

  // ── MOMENTUM ──
  const makeMomBox = (t) => {
    const trend = t.l10_bar > 0 ? t.l10_bar - t.barthag : 0;
    const trendColor = trend > 0.01 ? '#4ade80' : trend < -0.01 ? '#f87171' : '#94a3b8';
    const trendStr = trend > 0.01 ? `↑ +${(trend*1000|0)/10} pts HOT` :
                     trend < -0.01 ? `↓ ${(trend*1000|0)/10} pts COLD` : '→ FLAT';
    return `<div style="padding:14px 20px">
      <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--slate);letter-spacing:1px;margin-bottom:10px">LAST-10 MOMENTUM</div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">Season BARTHAG</span>
        <span class="dep-stat-val" style="color:${bartColor(t.barthag)}">${t.barthag}</span>
      </div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">L10 BARTHAG</span>
        <span class="dep-stat-val" style="color:${bartColor(t.l10_bar)}">${t.l10_bar.toFixed(3)}</span>
      </div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">L10 Record</span>
        <span class="dep-stat-val" style="color:var(--teal)">${t.l10_rec||'—'}</span>
      </div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">Trend</span>
        <span class="dep-stat-val" style="color:${trendColor}">${trendStr}</span>
      </div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">L10 AdjOE</span>
        <span class="dep-stat-val" style="color:var(--slate)">${t.l10_oe||'—'}</span>
      </div>
      <div class="dep-stat">
        <span class="dep-stat-lbl">L10 AdjDE</span>
        <span class="dep-stat-val" style="color:var(--slate)">${t.l10_de||'—'}</span>
      </div>
    </div>`;
  };

  // ── ROSTER ROWS ──
  const makeRosterTable = (t) => {
    const rows = t.players.map((p, i) => {
      const isTop = i === 0;
      const usgColor = p.usg >= 30 ? '#f87171' : p.usg >= 24 ? '#fbbf24' : 'var(--slate)';
      return `<tr>
        <td class="left">
          <span class="p-name${isTop?' p-star':''}">${isTop?'★ ':''}${p.name}</span>
          ${yrBadge(p.yr)}${injPill(p)}
        </td>
        <td class="${prpgColor(p.prpg)}">${p.prpg}</td>
        <td style="color:${usgColor}">${p.usg}%${usgBar(p.usg)}</td>
        <td style="color:${p.bpm>5?'#4ade80':p.bpm>0?'var(--slate)':'#f87171'}">${p.bpm>0?'+':''}${p.bpm}</td>
        <td>${p.ortg}</td>
        <td>${p.efg}%</td>
        <td>${p.ast}%</td>
        <td>${p.blk}</td>
      </tr>`;
    }).join('');
    return `<table class="rtable">
      <thead><tr>
        <th class="left">Player</th>
        <th>PRPG</th><th>USG</th><th>BPM</th>
        <th>ORtg</th><th>eFG%</th><th>Ast%</th><th>Blk</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  };

  // ── RISK FACTORS ──
  const makeRiskBox = (t) => {
    const items = riskItems(t);
    if (items.length === 0) return `<div class="risk-none">✅ No major risk flags identified.</div>`;
    return items.map(r => `<div class="risk-item">
      <div class="risk-icon">${r.icon}</div>
      <div class="risk-text"><strong>${r.title}</strong>${r.text}</div>
    </div>`).join('');
  };

  // ── VERDICT ──
  const makeVerdict = (tA, tB) => {
    const edges = {A:[], B:[], even:[]};
    if (tA.barthag > tB.barthag + 0.01) edges.A.push('BARTHAG advantage');
    else if (tB.barthag > tA.barthag + 0.01) edges.B.push('BARTHAG advantage');
    else edges.even.push('BARTHAG essentially equal');

    if (tA.adjOE > tB.adjOE + 2) edges.A.push('Offensive efficiency edge');
    else if (tB.adjOE > tA.adjOE + 2) edges.B.push('Offensive efficiency edge');

    if (tA.adjDE < tB.adjDE - 2) edges.A.push('Defensive efficiency edge');
    else if (tB.adjDE < tA.adjDE - 2) edges.B.push('Defensive efficiency edge');

    if (tA.exp > tB.exp + 0.3) edges.A.push('Roster experience advantage');
    else if (tB.exp > tA.exp + 0.3) edges.B.push('Roster experience advantage');

    const l10A = tA.l10_bar - tA.barthag;
    const l10B = tB.l10_bar - tB.barthag;
    if (l10A > l10B + 0.02) edges.A.push('Hotter entering tournament (L10)');
    else if (l10B > l10A + 0.02) edges.B.push('Hotter entering tournament (L10)');

    if (tA.usgConc < tB.usgConc - 0.1) edges.A.push('More balanced roster — lower star dependency');
    else if (tB.usgConc < tA.usgConc - 0.1) edges.B.push('More balanced roster — lower star dependency');

    if (tB.injStar && !tA.injStar) edges.A.push('Star player healthy');
    else if (tA.injStar && !tB.injStar) edges.B.push('Star player healthy');
    else if (tA.injStar && tB.injStar) { edges.A.push('Star injury concern'); edges.B.push('Star injury concern'); }

    const paseA = CONF_PASE[tA.conf] || '0';
    const paseB = CONF_PASE[tB.conf] || '0';
    if (parseFloat(paseA) > 2 && parseFloat(paseB) <= 0) edges.A.push(`${tA.conf} PASE ${paseA} — underseeded conference`);
    if (parseFloat(paseB) > 2 && parseFloat(paseA) <= 0) edges.B.push(`${tB.conf} PASE ${paseB} — underseeded conference`);

    const overall = edges.A.length > edges.B.length ? 'A' : edges.B.length > edges.A.length ? 'B' : 'even';
    const winTeam = overall === 'A' ? tA : overall === 'B' ? tB : null;

    const edgeLbl = (t, isWinner) => isWinner ?
      `<span class="verdict-edge edge-win">MODEL EDGE</span>` :
      `<span class="verdict-edge edge-lose">UNDERDOG</span>`;

    return `<div class="verdict-box">
      <div class="verdict-header">
        <h3>▶ MODEL VERDICT — EDGE SUMMARY</h3>
      </div>
      <div class="verdict-body">
        <div class="verdict-team">
          <h4 style="color:var(--teal)">${tA.team.toUpperCase()}</h4>
          ${edges.A.length ? edges.A.map(e=>`<div>✅ ${e}</div>`).join('') : '<div style="color:var(--slate)">No clear edges identified</div>'}
          ${edges.even.map(e=>`<div style="color:var(--slate)">— ${e}</div>`).join('')}
          ${edgeLbl(tA, overall==='A')}
        </div>
        <div class="verdict-team">
          <h4 style="color:var(--purple)">${tB.team.toUpperCase()}</h4>
          ${edges.B.length ? edges.B.map(e=>`<div>✅ ${e}</div>`).join('') : '<div style="color:var(--slate)">No clear edges identified</div>'}
          ${edgeLbl(tB, overall==='B')}
        </div>
      </div>
    </div>`;
  };

  main.innerHTML = `
    <div class="hero-compare">
      ${heroA}
      <div class="hc-divider"><div class="hc-divider-inner">VS</div></div>
      ${heroB}
    </div>

    ${makeVerdict(tA, tB)}

    <div class="sec-block">
      <div class="sec">▶ Efficiency Comparison</div>
      <div class="box">
        ${sectionHdr(tA, tB)}
        ${effRows.join('')}
      </div>
    </div>

    <div class="compare-grid">
      <div class="sec-block" style="margin-bottom:0">
        <div class="sec">▶ Momentum — Last 10</div>
        <div class="box">${makeMomBox(tA)}</div>
      </div>
      <div class="sec-block" style="margin-bottom:0">
        <div class="sec">▶ Momentum — Last 10</div>
        <div class="box">${makeMomBox(tB)}</div>
      </div>
    </div>

    <div class="sec-block" style="margin-top:16px">
      <div class="sec">▶ Roster Context</div>
      <div class="box">
        ${sectionHdr(tA, tB)}
        ${contextRows.join('')}
      </div>
    </div>

    <div class="dep-grid">
      <div class="sec-block" style="margin-bottom:0">
        <div class="sec">▶ Star Dependency · ${tA.team}</div>
        <div class="box">${makeDepBox(tA,'left')}</div>
      </div>
      <div class="sec-block" style="margin-bottom:0">
        <div class="sec">▶ Star Dependency · ${tB.team}</div>
        <div class="box">${makeDepBox(tB,'right')}</div>
      </div>
    </div>

    <div class="sec-block" style="margin-top:16px">
      <div class="sec">▶ Roster · ${tA.team}</div>
      <div class="box">${makeRosterTable(tA)}</div>
    </div>

    <div class="sec-block">
      <div class="sec">▶ Roster · ${tB.team}</div>
      <div class="box">${makeRosterTable(tB)}</div>
    </div>

    <div class="risk-grid">
      <div class="sec-block" style="margin-bottom:0">
        <div class="sec">▶ Risk Flags · ${tA.team}</div>
        <div class="box">${makeRiskBox(tA)}</div>
      </div>
      <div class="sec-block" style="margin-bottom:0">
        <div class="sec">▶ Risk Flags · ${tB.team}</div>
        <div class="box">${makeRiskBox(tB)}</div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
